name: Ubuntu Touch Halium 11 Build for Redmi Note 11T 5G

on:
  workflow_dispatch: # इसे आप GitHub Actions टैब से मैनुअली रन कर सकते हैं

jobs:
  build:
    runs-on: ubuntu-20.04
    permissions:
      contents: write

    steps:
      # स्टेप 1: अपनी रिपॉजिटरी के कोड को रनर पर लाना
      - name: Checkout Repository
        uses: actions/checkout@v4

      # स्टेप 2: गिट कॉन्फ़िगर करना (Repo टूल के लिए ज़रूरी है)
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      # स्टेप 3: डिस्क स्पेस खाली करना (Maximize Disk Space)
      - name: Free Disk Space (Clean Runner)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          echo "Disks space after cleanup:"
          df -h

      # स्टेप 4: बिल्ड के लिए ज़रूरी टूल्स और डिपेंडेंसीज इंस्टॉल करना
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip python3 bc

      # स्टेप 5: Google Repo टूल को इंस्टॉल करना
      - name: Install Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      # स्टेप 6: Halium 11 सोर्स कोड को इनिशियलाइज़ और सिंक करना
      - name: Download Halium 11 Source Code
        run: |
          mkdir -p halium
          cd halium
          # Halium 11 का मुख्य मैनिफ़ेस्ट इनिशियलाइज़ करें
          repo init -u https://github.com/Halium/android -b halium-11.0 --depth=1
          
          # यहाँ अपने Redmi Note 11T 5G के डिवाइस ट्री जोड़ने का कोड लिखें (यदि कोई लोकल मैनिफ़ेस्ट है)
          # उदाहरण: कर्नल और डिवाइस सोर्स सिंक करना
          
          echo "Syncing source code..."
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      # स्टेप 7: कर्नल और हलियम बूट इमेज का निर्माण (Build Process)
      - name: Build Halium Boot
        run: |
          cd halium
          # एनवायरनमेंट सेटअप स्क्रिप्ट को सोर्स करें
          source build/envsetup.sh
          
          # अपने डिवाइस (evergo) के लिए लंच (lunch) कमांड रन करें
          # नोट: यदि आपका डिवाइस नाम अलग है तो 'evergo' को बदलें
          lunch halium_evergo-userdebug || lunch aosp_evergo-userdebug
          
          # बूट इमेज और कर्नल बिल्ड करें
          make halium-boot -j$(nproc --all)

      # स्टेप 8: बनी हुई इमेजेस (.img) को GitHub पर अपलोड करना
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Halium-11-UbuntuTouch-RedmiNote11T
          path: |
            halium/out/target/product/*/halium-boot.img
            halium/out/target/product/*/boot.img
