name: Ubuntu Touch Halium 11 Build for Redmi Note 11T 5G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Free Disk Space (Maximize Storage)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          echo "=== उपलब्ध स्टोरेज ==="
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev libncurses-dev x11proto-core-dev libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip python3 bc rsync libssl-dev

      - name: Install Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Download Halium 11 Source Code
        run: |
          mkdir -p halium
          cd halium
          # मूल कोड पूरी तरह सुरक्षित है:
          repo init -u https://github.com/Halium/android -b halium-11.0 --depth=1
          echo "Syncing core Halium 11 source code..."
          
          # एरर फिक्स (ऐड किया गया): HTTP 502 नेटवर्क एरर को रोकने के लिए रीट्राई, फोर्स सिंक और फॉलबैक फ्लैग्स जोड़े गए हैं
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --fail-fast=0 --retries=4 || repo sync -c -j1 --force-sync --no-clone-bundle --no-tags

      - name: Clone Redmi Note 11T 5G Device Sources
        run: |
          cd halium
          echo "Cloning device specific trees..."
          # मूल निर्देशानुसार यह सेक्शन पूरी तरह सुरक्षित रखा गया है
          # git clone https://github.com/rnkr344/device_xiaomi_evergo_tree_11t_5g.git -b halium-11.0 device/xiaomi/evergo
          # git clone https://github.com/rnkr344/kernel_xiaomi_evergo_tree_11t_5g.git -b halium-11.0 kernel/xiaomi/evergo

      - name: Patch Lineage Soong Bug (Robust Neutralization Patch)
        run: |
          cd halium
          if [ -f vendor/lineage/build/soong/Android.bp ]; then
            echo "Applying final command block patch to neutralize uninitialized kernel variables..."
            
            # आपकी मूल sed कमांड (अपरिवर्तित):
            sed -i 's/cmd: .*/cmd: "echo Skipping inline kernel headers",/g' vendor/lineage/build/soong/Android.bp
            
            # पुराना ब्रैकेट पार्सिंग एरर फिक्स (अपरिवर्तित ऐड):
            sed -i '/bootstrap_go_package {/,/^}/s/^/\/\//' vendor/lineage/build/soong/Android.bp 2>/dev/null || true
            sed -i '/name: "generated_kernel_includes"/,/^}/s/^/\/\//' vendor/lineage/build/soong/Android.bp 2>/dev/null || true
            
            # एरर फिक्स (ऐड किया गया इनलाइन पायथन ब्लॉक): ब्रैकेट और $ पार्सिंग एरर को जड़ से खत्म करने के लिए
            python3 -c '
          file_path = "vendor/lineage/build/soong/Android.bp"
          with open(file_path, "r") as f:
              content = f.read()
          content = content.replace("$(PATH_OVERRIDE_SOONG)", "true")
          content = content.replace("cc_literal", "// cc_literal")
          with open(file_path, "w") as f:
              f.write(content)
          '
            
            # बाईपास फ्लैग्स (अपरिवर्तित):
            echo "TARGET_HAS_LEGACY_KERNEL_HEADERS := true" >> build/core/config.mk
            echo "BOARD_ALLOW_MISSING_PREBUILT_KERNEL := true" >> build/core/config.mk
            echo "पैच सफलतापूर्वक लागू किया गया!"
          else
            echo "Warning: Lineage Soong file not found, skipping patch."
          fi

      - name: Build Halium Boot
        run: |
          cd halium
          source build/envsetup.sh
          
          # मूल सेटिंग्स को वैसे ही रखते हुए रैम सुरक्षा वेरिएबल्स ऐड हैं
          export SOONG_ALLOW_MISSING_DEPENDENCIES=true
          export MAX_ARG_STRLEN=131072
          
          # 15.6GB रैम लिमिट क्रैश से बचने के लिए कोर सीमित की गई हैं
          BUILD_THREADS=$(expr $(nproc) / 2)
          if [ $BUILD_THREADS -le 0 ]; then BUILD_THREADS=1; fi
          echo "Using $BUILD_THREADS threads for build to safely manage RAM limit..."

          # जेनेरिक आर्म64 आर्किटेक्चर पर लंच (Lunch) का प्रयास
          lunch aosp_arm64-userdebug || lunch halium_arm64-userdebug
          
          # डेटा स्टोरेज के लिए लॉग डायरेक्टरी बनाना
          mkdir -p out
          touch out/build_error_analysis.log
          
          # इमेज कंपाइल करना और लॉग्स को फाइल में स्टोर करना (tee)
          make halium-boot -j${BUILD_THREADS} 2>&1 | tee out/build_error_analysis.log || make bootimage -j${BUILD_THREADS} 2>&1 | tee -a out/build_error_analysis.log

      - name: Store All Logs and Debug Data (Always Save Data)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Halium-11-Build-Data-And-Logs
          path: |
            halium/out/build_error_analysis.log
            halium/out/soong/build.ninja
            halium/vendor/lineage/build/soong/Android.bp
          if-no-files-found: ignore

      - name: Upload Build Artifacts (Only on Success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Halium-11-UbuntuTouch-Generic-ARM64
          path: |
            halium/out/target/product/*/halium-boot.img
            halium/out/target/product/*/boot.img
