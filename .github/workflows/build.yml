name: Ubuntu Touch Halium 11 Build for Redmi Note 11T 5G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Free Disk Space (Maximize Storage)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev libncurses-dev x11proto-core-dev libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip python3 bc rsync libssl-dev

      - name: Install Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Download Halium 11 Source Code
        run: |
          mkdir -p halium
          cd halium
          # मुख्य हलियम 11 बेस सोर्स को इनिशियलाइज करना
          repo init -u https://github.com/Halium/android -b halium-11.0 --depth=1
          echo "Syncing core Halium 11 source code..."
          # सबसे सुरक्षित और मानक (Standard) सिंक कमांड
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Patch Lineage Soong Bug
        run: |
          cd halium
          # 'PATH_OVERRIDE_SOONG' एरर को ठीक करने के लिए फ़ाइल को ऑटो-पैच करना
          if [ -f vendor/lineage/build/soong/Android.bp ]; then
            echo "Patching vendor/lineage/build/soong/Android.bp..."
            sed -i 's/\$(PATH_OVERRIDE_SOONG)//g' vendor/lineage/build/soong/Android.bp
          else
            echo "Warning: Lineage Soong file not found yet, skipping patch."
          fi

      - name: Build Halium Boot
        run: |
          cd halium
          source build/envsetup.sh
          # जेनेरिक आर्म64 आर्किटेक्चर पर लंच का प्रयास करें
          lunch aosp_arm64-userdebug || lunch halium_arm64-userdebug
          # जेनेरिक बूट इमेज कंपाइल करें
          make halium-boot -j$(nproc --all) || make bootimage -j$(nproc --all)

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Halium-11-UbuntuTouch-Generic-ARM64
          path: |
            halium/out/target/product/*/halium-boot.img
            halium/out/target/product/*/boot.img
