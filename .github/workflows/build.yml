name: Ubuntu Touch Halium 11 Build for Redmi Note 11T 5G

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Free Disk Space (Maximize Storage)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev libncurses-dev x11proto-core-dev libx11-dev lib32z-dev ccache libgl1-mesa-dev libxml2-utils xsltproc unzip python3 bc rsync libssl-dev

      - name: Install Google Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      # स्टेप 6: सुधरा हुआ सोर्स डाउनलोड और मैनिफ़ेस्ट क्रिएशन
      - name: Download Halium 11 Source Code
        run: |
          mkdir -p halium
          cd halium
          # 1. मुख्य हलियम 11 सोर्स इनिशियलाइज़ करें
          repo init -u https://github.com/Halium/android -b halium-11.0 --depth=1
          
          # 2. लोकल मैनिफ़ेस्ट फ़ोल्डर बनाना
          mkdir -p .repo/local_manifests
          
          # 3. स्वचालित रूप से डिवाइस और कर्नल सोर्स को मैनिफ़ेस्ट में लिखना (Correct Manifest Entry)
          # यहाँ हम कम्युनिटी के सबसे स्थिर सोर्स का पाथ जोड़ रहे हैं
          cat <<EOF > .repo/local_manifests/roomservice.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="Halium-Xiaomi-MT6833/android_device_xiaomi_evergo" path="device/xiaomi/evergo" remote="github" revision="halium-11" />
            <project name="Halium-Xiaomi-MT6833/android_kernel_xiaomi_evergo" path="kernel/xiaomi/evergo" remote="github" revision="halium-11" />
          </manifest>
          EOF
          
          echo "Syncing all source code with proper manifests..."
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Build Halium Boot
        run: |
          cd halium
          source build/envsetup.sh
          
          # सही लंच कमांड टारगेट करना
          lunch halium_evergo-userdebug || lunch aosp_evergo-userdebug
          
          make halium-boot -j$(nproc --all)

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Halium-11-UbuntuTouch-RedmiNote11T
          path: |
            halium/out/target/product/*/halium-boot.img
            halium/out/target/product/*/boot.img
