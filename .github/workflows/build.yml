name: Ubuntu Touch (Halium 11) Build for Redmi Note 11T 5G

on:
  workflow_dispatch: # इसे आप GitHub UI से मैन्युअली स्टार्ट कर सकते हैं

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Up Disk Space
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        df -h

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib \
        gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
        liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
        lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
        openjdk-11-jdk python3 python-is-python3 repo libffi-dev libssl-dev
        
        # आपकी सही डिटेल्स के साथ Git Configuration
        git config --global user.name "rnkr344"
        git config --global user.email "rnkr344@gmail.com"

    - name: Download Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Initialize Halium Source Tree
      run: |
        mkdir -p ~/halium
        cd ~/halium
        repo init -u https://github.com/Halium/android -b halium-11.0 --depth=1
        
    - name: Configure Local Manifest (rnkr344 Repositories)
      run: |
        cd ~/halium
        mkdir -p .repo/local_manifests
        
        # आपके यूजरनेम के साथ सोर्स पाथ सेट कर दिया गया है
        cat <<EOF > .repo/local_manifests/evergo.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project path="device/xiaomi/evergo" name="rnkr344/android_device_xiaomi_evergo" remote="github" revision="halium-11.0" />
          <project path="kernel/xiaomi/evergo" name="rnkr344/android_kernel_xiaomi_evergo" remote="github" revision="halium-11.0" />
          <project path="vendor/xiaomi/evergo" name="rnkr344/android_vendor_xiaomi_evergo" remote="github" revision="halium-11.0" />
        </manifest>
        EOF

    - name: Repo Sync Sources
      run: |
        cd ~/halium
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Setup Build Environment & Run Build
      run: |
        cd ~/halium
        export USE_CCACHE=1
        source build/envsetup.sh
        
        # evergo डिवाइस को लंच करें
        lunch halium_evergo-userdebug
        
        # Ubuntu Touch के लिए बूट और सिस्टम इमेज बिल्ड करें
        make -j$(nproc --all) halium-boot
        make -j$(nproc --all) systemimage

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Halium-Evergo-Build
        path: |
          ~/halium/out/target/product/evergo/halium-boot.img
          ~/halium/out/target/product/evergo/system.img
