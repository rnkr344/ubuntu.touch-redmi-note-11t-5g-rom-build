name: Ubuntu Touch (Halium 11) Build for Redmi Note 11T 5G

on:
  workflow_dispatch: # इसे आप GitHub UI से मैन्युअली स्टार्ट कर सकते हैं

jobs:
  build:
    runs-on: ubuntu-22.04 # यह रनर कतार (Queue) में नहीं फंसता और जल्दी अलॉट होता है
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Up Disk Space (Maximize Space)
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 30720 # रूट (/) के लिए 30GB स्पेस रिज़र्व ताकि apt install फेल न हो
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib \
        gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
        liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
        lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
        openjdk-11-jdk python3 python-is-python3 libffi-dev libssl-dev
        
        # आपकी सही डिटेल्स के साथ Git Configuration
        git config --global user.name "rnkr344"
        git config --global user.email "rnkr344@gmail.com"

    - name: Download & Install Repo Tool Globals
      run: |
        sudo curl https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
        sudo chmod a+rx /usr/local/bin/repo

    - name: Initialize Halium Source Tree
      run: |
        mkdir -p ${{ github.workspace }}/halium
        cd ${{ github.workspace }}/halium
        repo init -u https://github.com/Halium/android -b halium-11.0 --depth=1
        
    - name: Configure Local Manifest (rnkr344 Repositories)
      run: |
        cd ${{ github.workspace }}/halium
        mkdir -p .repo/local_manifests
        
        # यहाँ सभी प्रोजेक्ट्स की ब्रांच को 'main' पर सेट किया गया है ताकि 'branch not found' एरर न आए
        # नोट: यदि आपकी किसी रिपॉजिटरी की मुख्य ब्रांच का नाम 'master' या 'lineage-18.1' है, 
        # तो आप नीचे 'main' को बदलकर अपनी उस सही ब्रांच का नाम लिख सकते हैं।
        cat <<EOF > .repo/local_manifests/evergo.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project path="device/xiaomi/evergo" name="rnkr344/android_device_xiaomi_evergo" remote="github" revision="main" />
          <project path="kernel/xiaomi/evergo" name="rnkr344/android_kernel_xiaomi_evergo" remote="github" revision="main" />
          <project path="vendor/xiaomi/evergo" name="rnkr344/android_vendor_xiaomi_evergo" remote="github" revision="main" />
        </manifest>
        EOF

    - name: Repo Sync Sources
      run: |
        cd ${{ github.workspace }}/halium
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Setup Build Environment & Run Build
      run: |
        cd ${{ github.workspace }}/halium
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        source build/envsetup.sh
        
        # evergo डिवाइस को लंच करें
        lunch halium_evergo-userdebug
        
        # Ubuntu Touch के लिए बूट और सिस्टम इमेज बिल्ड करें
        make -j$(nproc --all) halium-boot
        make -j$(nproc --all) systemimage

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Halium-Evergo-Build
        path: |
          ${{ github.workspace }}/halium/out/target/product/evergo/halium-boot.img
          ${{ github.workspace }}/halium/out/target/product/evergo/system.img
