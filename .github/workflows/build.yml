name: Ubuntu Touch (Halium 11) Build for Redmi Note 11T 5G

on:
  workflow_dispatch: # इसे आप GitHub UI से मैन्युअली स्टार्ट कर सकते हैं

jobs:
  build:
    runs-on: ubuntu-22.04 # यह रनर बिना कतार के तुरंत अलॉट होता है
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Up Disk Space (Maximize Space)
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 30720 # dependencies install के लिए 30GB सुरक्षित ताकि apt fail न हो
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Install Build Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex g++-multilib \
        gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
        liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
        lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
        openjdk-11-jdk python3 python-is-python3 libffi-dev libssl-dev
        
        # Git Configuration
        git config --global user.name "rnkr344"
        git config --global user.email "rnkr344@gmail.com"

    - name: Download & Install Repo Tool Globals
      run: |
        sudo curl https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
        sudo chmod a+rx /usr/local/bin/repo

    - name: Initialize Halium Source Tree
      run: |
        mkdir -p ${{ github.workspace }}/halium
        cd ${{ github.workspace }}/halium
        repo init -u https://github.com/Halium/android -b halium-11.0 --depth=1
        
    - name: Configure Local Manifest (Exact Branches Locked)
      run: |
        cd ${{ github.workspace }}/halium
        mkdir -p .repo/local_manifests
        
        # आपकी तीनों रिपॉजिटरीज की रियल ब्रांचेस यहाँ सेट कर दी गई हैं
        cat <<EOF > .repo/local_manifests/evergo.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project path="device/xiaomi/evergo" name="rnkr344/android_device_xiaomi_evergo" remote="github" revision="arrow-12.1-wip" />
          
          <project path="kernel/xiaomi/evergo" name="rnkr344/android_kernel_xiaomi_evergo" remote="github" revision="Master" />
          
          <project path="vendor/xiaomi/evergo" name="rnkr344/android_vendor_xiaomi_evergo" remote="github" revision="Master" />
        </manifest>
        EOF

    - name: Repo Sync Sources
      run: |
        cd ${{ github.workspace }}/halium
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Setup Build Environment & Fix Product Specs
      run: |
        cd ${{ github.workspace }}/halium
        
        # 1. डिवाइस ट्री के अंदर मेकफाइल्स को ऑटो-पैच और रीनेम करना ताकि Spec Not Found एरर न आए
        cd device/xiaomi/evergo
        
        # अगर कोई भी .mk फाइल है (जैसे arrow_everpal.mk), उसे halium_evergo.mk में बदलें
        find . -maxdepth 1 -name "*.mk" ! -name "Android*" ! -name "CleanSpec*" -exec mv {} halium_evergo.mk \; 2>/dev/null || true
        
        # फाइलों के अंदर जहाँ भी पुराने प्रोडक्ट नाम या ओएस नाम हैं, उन्हें 'halium_evergo' से रिप्लेस करें
        find . -type f -name "*.mk" -exec sed -i 's/arrow_everpal/halium_evergo/g' {} +
        find . -type f -name "*.mk" -exec sed -i 's/lineage_everpal/halium_evergo/g' {} +
        find . -type f -name "*.mk" -exec sed -i 's/arrow_evergo/halium_evergo/g' {} +
        find . -type f -name "*.mk" -exec sed -i 's/lineage_evergo/halium_evergo/g' {} +
        find . -type f -name "*.mk" -exec sed -i 's/everpal/evergo/g' {} +
        
        # AndroidProducts.mk के अंदर प्रोडक्ट लिंक को सही करना
        if [ -f AndroidProducts.mk ]; then
          sed -i 's/\$(LOCAL_DIR)\/.*\.mk/\$(LOCAL_DIR)\/halium_evergo.mk/g' AndroidProducts.mk
        fi
        
        # 2. वापस मुख्य डायरेक्टरी में आकर बिल्ड प्रक्रिया शुरू करना
        cd ${{ github.workspace }}/halium
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        source build/envsetup.sh
        
        # अब यह बिना किसी 'Spec Not Found' एरर के लंच हो जाएगा
        lunch halium_evergo-userdebug
        
        # Ubuntu Touch इमेजेस बिल्ड करना
        make -j$(nproc --all) halium-boot
        make -j$(nproc --all) systemimage

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UT-Halium-Evergo-Build
        path: |
          ${{ github.workspace }}/halium/out/target/product/evergo/halium-boot.img
          ${{ github.workspace }}/halium/out/target/product/evergo/system.img
